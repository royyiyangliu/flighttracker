<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>东方航空 · 航班追踪</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f0f2f5; color: #1a1a2e; min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff; padding: 18px 32px 0;
    }
    .header-top {
      display: flex; align-items: baseline; justify-content: space-between;
      flex-wrap: wrap; gap: 8px; padding-bottom: 16px;
    }
    .header-title { font-size: 1.3rem; font-weight: 700; letter-spacing: .02em; }
    .header-sub   { font-size: 0.78rem; color: #8898aa; margin-top: 4px; }
    .tab-nav { display: flex; }
    .tab-btn {
      padding: 10px 28px; background: transparent; border: none;
      color: #8898aa; font-size: 0.9rem; font-weight: 500; cursor: pointer;
      border-bottom: 3px solid transparent; transition: all .2s; font-family: inherit;
    }
    .tab-btn:hover { color: #fff; }
    .tab-btn.active { color: #fff; border-bottom-color: #4e73df; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .main-wrap { max-width: 1300px; margin: 0 auto; padding: 24px 20px; }

    /* ── City pair tabs ── */
    .city-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .city-tab {
      padding: 9px 24px; background: #fff; border: 1.5px solid #dee2e6;
      border-radius: 8px; font-size: 0.92rem; font-weight: 600;
      cursor: pointer; color: #495057; transition: all .18s; font-family: inherit;
    }
    .city-tab:hover { border-color: #4e73df; color: #4e73df; }
    .city-tab.active { background: #4e73df; border-color: #4e73df; color: #fff; }

    /* ── Filter bar ── */
    .ops-filters {
      display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
      background: #fff; padding: 11px 16px; border-radius: 10px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06); margin-bottom: 18px;
    }
    .filter-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .filter-label { font-size: 0.78rem; color: #6c757d; white-space: nowrap; }
    .filter-sep { width: 1px; height: 18px; background: #e9ecef; }
    .apt-btn {
      padding: 4px 11px; border-radius: 6px; border: 1.5px solid #dee2e6;
      background: #fff; font-size: 0.78rem; font-weight: 500; color: #6c757d;
      cursor: pointer; transition: all .15s; font-family: inherit;
    }
    .apt-btn:hover { border-color: #4e73df; color: #4e73df; }
    .apt-btn.active { background: #eef2ff; border-color: #4e73df; color: #4e73df; font-weight: 600; }
    .filter-select {
      padding: 5px 10px; border: 1.5px solid #dee2e6; border-radius: 7px;
      font-size: 0.82rem; color: #1a1a2e; background: #fff;
      cursor: pointer; font-family: inherit;
    }
    .filter-select:focus { outline: none; border-color: #4e73df; }

    /* ── Stats ── */
    .stats-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px; margin-bottom: 18px;
    }
    .stat-card {
      background: #fff; border-radius: 10px; padding: 13px 15px;
      border-top: 3px solid #4e73df; box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .stat-label { font-size: 0.69rem; color: #6c757d; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
    .stat-value { font-size: 1.45rem; font-weight: 700; line-height: 1.15; }
    .stat-sub   { font-size: 0.69rem; color: #adb5bd; margin-top: 2px; }
    .stat-card.green  { border-top-color: #1cc88a; }
    .stat-card.yellow { border-top-color: #f6c23e; }
    .stat-card.red    { border-top-color: #e74a3b; }

    /* ── Table ── */
    .table-wrap {
      background: #fff; border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06); overflow: hidden;
    }
    .table-header-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px; border-bottom: 1px solid #f0f0f0;
    }
    .table-title { font-size: 0.88rem; font-weight: 600; }
    .table-count { font-size: 0.75rem; color: #adb5bd; }
    table.ops-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    .ops-table thead tr { background: #f8f9fc; }
    .ops-table th {
      padding: 9px 12px; text-align: left; font-weight: 600;
      font-size: 0.71rem; color: #6c757d; text-transform: uppercase;
      letter-spacing: .04em; white-space: nowrap; cursor: pointer; user-select: none;
    }
    .ops-table th:hover { color: #4e73df; }
    .ops-table th .sa { margin-left: 3px; opacity: .4; }
    .ops-table th.sorted .sa { opacity: 1; }
    .ops-table td {
      padding: 8px 12px; border-top: 1px solid #f5f5f8;
      white-space: nowrap; vertical-align: middle;
    }
    .ops-table tbody tr:hover { background: #fafbff; }

    .delay-badge { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 0.79rem; font-weight: 600; }
    .delay-early  { background: #d4edda; color: #155724; }
    .delay-ontime { background: #d1ecf1; color: #0c5460; }
    .delay-slight { background: #fff3cd; color: #856404; }
    .delay-mod    { background: #ffe5d0; color: #7b3f00; }
    .delay-heavy  { background: #f8d7da; color: #721c24; }
    .delay-na     { color: #adb5bd; font-size: 0.79rem; }

    .empty-msg { text-align: center; padding: 48px 20px; color: #adb5bd; font-size: 0.9rem; }

    /* ── Bar chart tooltip ── */
    #bar-tip {
      position: fixed; z-index: 9999; pointer-events: none; display: none;
      background: rgba(26,26,46,.93); color: #fff;
      padding: 7px 11px; border-radius: 7px; font-size: 0.78rem; line-height: 1.6;
      white-space: nowrap; box-shadow: 0 3px 10px rgba(0,0,0,.25);
    }
    #bar-tip .tip-date { color: #8898aa; font-size: .72rem; }

    /* ── Tab 2: 价格 ── */
    .route-section { margin-bottom: 40px; }
    .route-header {
      background: #fff; border-radius: 12px 12px 0 0;
      padding: 16px 22px; border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; flex-wrap: wrap; gap: 6px 20px;
    }
    .route-label  { font-size: 1rem; font-weight: 700; color: #1a1a2e; margin-right: 8px; }
    .route-tag    { font-size: .75rem; color: #6c757d; background: #f0f2f5; border-radius: 5px; padding: 3px 9px; white-space: nowrap; }
    .route-tag-em { font-size: .75rem; color: #4e73df; background: #eef2ff; border-radius: 5px; padding: 3px 9px; font-weight: 500; white-space: nowrap; }
    .flights-wrap { background: #fff; padding: 16px 22px 20px; }
    .flights-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
    .flight-card  { background: #fafbff; border-radius: 10px; padding: 14px 16px; border: 1px solid #e8eaf0; border-top: 3px solid #4e73df; }
    .flight-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .flight-no    { font-size: 1rem; font-weight: 700; }
    .flight-badge { font-size: .65rem; background: #eef2ff; color: #4e73df; border-radius: 4px; padding: 2px 6px; }
    .flight-time  { font-size: .85rem; color: #495057; margin-bottom: 2px; }
    .flight-meta  { font-size: .72rem; color: #adb5bd; margin-bottom: 12px; }
    .flight-price { font-size: 1.7rem; font-weight: 700; line-height: 1; }
    .flight-price .sym { font-size: 1rem; font-weight: 400; color: #6c757d; margin-right: 1px; }
    .price-change { font-size: .75rem; margin-top: 4px; font-weight: 500; }
    .price-change.up   { color: #e74a3b; }
    .price-change.down { color: #1cc88a; }
    .price-change.flat { color: #adb5bd; }
    .flight-ts    { font-size: .68rem; color: #ced4da; margin-top: 3px; }
    .chart-wrap-outer {
      background: #fff; border-radius: 0 0 12px 12px;
      padding: 16px 22px 22px; border-top: 1px solid #f0f0f0;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    .chart-title-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 16px; }
    .chart-title    { font-size: .9rem; font-weight: 600; }
    .chart-subtitle { font-size: .75rem; color: #adb5bd; }
    .chart-inner    { position: relative; height: 300px; }
    footer { text-align: center; font-size: .72rem; color: #adb5bd; padding: 8px 0 28px; }

    /* ── Widebody row highlight ── */
    .wide-row { background: #eef2ff !important; }
    .wide-row:hover { background: #e4eaff !important; }

    /* ── Aircraft comfort badge ── */
    .ac-badge {
      display: block; margin-top: 3px;
      font-size: .68rem; color: #6c757d; white-space: nowrap; letter-spacing: .01em;
    }

    /* ── Aircraft info tooltip ── */
    #ac-tip {
      position: fixed; z-index: 9999; pointer-events: none; display: none;
      background: rgba(22,33,62,.97); color: #dde4f0;
      padding: 12px 15px; border-radius: 10px; font-size: 0.78rem; line-height: 1.75;
      min-width: 230px; max-width: 290px; white-space: normal;
      box-shadow: 0 6px 20px rgba(0,0,0,.35);
    }
    #ac-tip .tip-title { color: #fff; font-weight: 700; font-size: .86rem; margin-bottom: 7px; padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,.13); }
    #ac-tip .tip-section { color: #7a9cc0; font-size: .68rem; text-transform: uppercase; letter-spacing: .07em; margin: 8px 0 3px; }
    #ac-tip .tip-row { display: flex; justify-content: space-between; gap: 10px; }
    #ac-tip .tip-label { color: #8898aa; flex-shrink: 0; }
    #ac-tip .tip-stars { color: #f6c23e; font-weight: 600; }
    #ac-tip .tip-val { text-align: right; }
    #ac-tip .tip-note { color: #a8bcd8; font-style: italic; font-size: .72rem; }
    #ac-tip .tip-seats { color: #7a9cc0; font-size: .72rem; margin-top: 8px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,.1); }

    /* ── Legend box ── */
    .legend-box {
      display: flex; align-items: flex-start; gap: 20px; flex-wrap: wrap;
      background: #fff; border: 1px solid #e9ecef; border-radius: 10px;
      padding: 10px 16px; margin-bottom: 14px; font-size: .77rem; color: #6c757d;
    }
    .legend-block { display: flex; flex-direction: column; gap: 3px; }
    .legend-title { font-size: .69rem; font-weight: 700; color: #495057; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 2px; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-swatch { width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0; }
    .legend-sep { width: 1px; background: #e9ecef; align-self: stretch; margin: 0 2px; }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="header-title">东方航空 · 航班追踪</div>
      <div class="header-sub" id="header-sub">加载中…</div>
    </div>
  </div>
  <nav class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('ops',this)">✈ 航班运营</button>
    <button class="tab-btn"        onclick="switchTab('price',this)">¥ 机票价格</button>
  </nav>
</header>

<!-- TAB 1 -->
<div id="tab-ops" class="tab-panel active">
  <div class="main-wrap">
    <div class="city-tabs" id="city-tabs"></div>

    <div class="ops-filters" id="ops-filters" style="display:none">
      <div class="filter-group" id="dep-grp"></div>
      <div class="filter-sep"   id="dep-sep" style="display:none"></div>
      <div class="filter-group" id="arr-grp"></div>
      <div class="filter-sep"   id="arr-sep" style="display:none"></div>
      <div class="filter-group">
        <span class="filter-label">近期：</span>
        <select class="filter-select" id="filter-days" onchange="render()">
          <option value="7">7 天</option>
          <option value="14">14 天</option>
          <option value="30" selected>30 天</option>
          <option value="60">60 天</option>
          <option value="0">全部</option>
        </select>
      </div>
      <div class="filter-sep"></div>
      <div class="filter-group">
        <span class="filter-label">机身：</span>
        <button class="apt-btn active" id="body-all"    onclick="setBodyFilter('all',this)">全部</button>
        <button class="apt-btn"        id="body-wide"   onclick="setBodyFilter('wide',this)">宽体</button>
        <button class="apt-btn"        id="body-narrow" onclick="setBodyFilter('narrow',this)">窄体</button>
      </div>
    </div>

    <div class="stats-row" id="stats-row" style="display:none">
      <div class="stat-card green">
        <div class="stat-label">准点率</div>
        <div class="stat-value" id="s-ontime">—</div>
        <div class="stat-sub">落地延误 ≤15分钟</div>
      </div>
      <div class="stat-card yellow">
        <div class="stat-label">平均落地延误</div>
        <div class="stat-value" id="s-avg">—</div>
        <div class="stat-sub">分钟（负=提前）</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label">重度延误率</div>
        <div class="stat-value" id="s-heavy">—</div>
        <div class="stat-sub">落地延误 &gt;60分钟</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">有效样本</div>
        <div class="stat-value" id="s-count" style="font-size:1.1rem">—</div>
        <div class="stat-sub" id="s-count-sub"></div>
      </div>
    </div>

    <div class="legend-box" id="legend-box" style="display:none">
      <div class="legend-block">
        <div class="legend-title">机身类型</div>
        <div class="legend-item"><span class="legend-swatch" style="background:#c7d4ff;border:1px solid #b0bfff"></span>宽体机（过道较宽，空间宽敞）</div>
        <div class="legend-item"><span class="legend-swatch" style="background:#f8f9fc;border:1px solid #dee2e6"></span>窄体机</div>
      </div>
      <div class="legend-sep"></div>
      <div class="legend-block">
        <div class="legend-title">舒适度评级（经济舱 / 商务舱）</div>
        <div>1★ 老旧　2★ 标准　3★ 较好　4★ 宽敞　5★ 旗舰</div>
        <div style="margin-top:2px;color:#adb5bd;font-size:.7rem">💡 鼠标悬停机型名称可查看座位详情</div>
      </div>
    </div>

    <div class="table-wrap" id="tbl-wrap" style="display:none">
      <div class="table-header-row">
        <div class="table-title">各航班统计</div>
        <div class="table-count" id="tbl-count"></div>
      </div>
      <div style="overflow-x:auto">
        <table class="ops-table">
          <thead><tr>
            <th onclick="doSort('flight')"    data-col="flight">航班号 <span class="sa">↕</span></th>
            <th onclick="doSort('route')"     data-col="route">出发 → 到达 <span class="sa">↕</span></th>
            <th onclick="doSort('aircraft')"  data-col="aircraft">机型 <span class="sa">↕</span></th>
            <th onclick="doSort('dep_sched')" data-col="dep_sched">计划时间 <span class="sa">↑</span></th>
            <th>实际均值</th>
            <th onclick="doSort('avg_delay')" data-col="avg_delay">平均落地延误 <span class="sa">↕</span></th>
            <th>近60天延误趋势 <span style="font-size:.63rem;color:#c0c4cc;font-weight:400">← 旧　新 →</span></th>
          </tr></thead>
          <tbody id="ops-tbody"></tbody>
        </table>
      </div>
    </div>
    <div class="empty-msg" id="ops-empty" style="display:none">暂无数据</div>
  </div>
</div>

<!-- TAB 2 -->
<div id="tab-price" class="tab-panel">
  <div class="main-wrap">
    <div id="app"><div class="empty-msg">加载中…</div></div>
  </div>
  <footer id="footer"></footer>
</div>

<div id="bar-tip"></div>
<div id="ac-tip"></div>

<script>
/* ════════════════════════════════════════════
   公共
════════════════════════════════════════════ */
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

/* ════════════════════════════════════════════
   TAB 1 — 航班运营
════════════════════════════════════════════ */

function lookupAircraft(raw) {
  if (!raw || raw === '—') return null;
  const s = raw
    .replace(/^(Airbus|Boeing|Comac)\s+/i, '')
    .replace(/\s*\(winglets?\)pax\s*/gi, '')
    .replace(/\s*\(winglets?\)\s*/gi, '')
    .replace(/\s*pax\s*$/i, '')
    .replace(/\s*Passenger\s*$/i, '')
    .replace(/\s+Dreamliner\s*/i, '')
    .replace(/MAX\s+/i, 'MAX ')
    .trim();
  if (AIRCRAFT_INFO[s]) return AIRCRAFT_INFO[s];
  for (const key of Object.keys(AIRCRAFT_INFO)) {
    if (s.startsWith(key) || key.startsWith(s)) return AIRCRAFT_INFO[key];
  }
  return null;
}
function isWidebody(raw) { return lookupAircraft(raw)?.wide === true; }

/* ── 工具 ── */
function bjDate(daysAgo) {
  const ms = Date.now() + 8*3600000 - daysAgo*86400000;
  return new Date(ms).toISOString().slice(0,10).replace(/-/g,'');
}
function t2m(t) {
  if (!t || !/^\d{1,2}:\d{2}$/.test(t)) return null;
  const [h,m] = t.split(':').map(Number); return h*60+m;
}
function m2t(m) {
  if (m == null || isNaN(m)) return '—';
  const tot = ((Math.round(m)%1440)+1440)%1440;
  return String(Math.floor(tot/60)).padStart(2,'0')+':'+String(tot%60).padStart(2,'0');
}
function modeOf(arr) {
  const c={}; for(const v of arr){if(v)c[v]=(c[v]||0)+1;}
  return Object.entries(c).sort((a,b)=>b[1]-a[1])[0]?.[0]||null;
}
function avgOf(nums) {
  const v=nums.filter(n=>n!=null&&!isNaN(n));
  return v.length ? v.reduce((a,b)=>a+b,0)/v.length : null;
}
function delayColor(d) {
  if (d==null) return '#dee2e6';
  if (d<=0)  return '#1cc88a';
  if (d<=15) return '#4e73df';
  if (d<=30) return '#f6c23e';
  if (d<=60) return '#fd7e14';
  return '#e74a3b';
}
function delayBadge(d) {
  if (d==null) return '<span class="delay-na">—</span>';
  const lbl=(d>=0?'+':'')+Math.round(d)+'分';
  if (d<=0)  return `<span class="delay-badge delay-early">${lbl}</span>`;
  if (d<=15) return `<span class="delay-badge delay-ontime">${lbl}</span>`;
  if (d<=30) return `<span class="delay-badge delay-slight">${lbl}</span>`;
  if (d<=60) return `<span class="delay-badge delay-mod">${lbl}</span>`;
  return `<span class="delay-badge delay-heavy">${lbl}</span>`;
}

/* ── 柱状图 ── */
function barChart(delayMap, gmax) {
  const W=181, H=40, bw=2, gap=1, step=3;
  // 基准线
  let svg = `<line x1="0" y1="${H}" x2="${W}" y2="${H}" stroke="#e9ecef" stroke-width="1"/>`;
  for (let i=0; i<60; i++) {
    const daysAgo = 60-i;                     // i=0 → 60天前(左), i=59 → 昨天(右)
    const ds = bjDate(daysAgo);
    const d  = delayMap.get(ds);
    if (d == null) continue;
    const rawH = gmax>0 ? (Math.max(0,d)/gmax)*H : 0;
    const h = Math.max(2, Math.round(rawH));
    const y = H - h;
    svg += `<rect x="${i*step}" y="${y}" width="${bw}" height="${h}" fill="${delayColor(d)}" rx="0.5" data-d="${ds}" data-v="${d}" style="cursor:crosshair"/>`;
  }
  return `<svg width="${W}" height="${H}" style="display:block;vertical-align:middle">${svg}</svg>`;
}

/* ── 数据加载 ── */
async function loadOpsData() {
  const routes = [...new Set(CITY_PAIRS.flatMap(p=>p.routes))];
  await Promise.all(routes.map(async r => {
    try {
      const res = await fetch(`data/ops/${r}.json?v=${Date.now()}`);
      if (!res.ok) return;
      const j = await res.json();
      if (j.records?.length) opsData[r] = j;
    } catch {}
  }));
  buildCityTabs();
  selectPair('SH-BJ');
  document.getElementById('header-sub').textContent =
    '数据来源：FlightView · 时间均为北京时间 · GitHub Actions 每日 04:00 自动更新';
}

function buildCityTabs() {
  const el = document.getElementById('city-tabs');
  CITY_PAIRS.forEach(p => {
    const b = document.createElement('button');
    b.className = 'city-tab'; b.textContent = p.label; b.dataset.city = p.id;
    b.onclick = () => selectPair(p.id);
    el.appendChild(b);
  });
}

function selectPair(id) {
  pair = CITY_PAIRS.find(p=>p.id===id);
  document.querySelectorAll('.city-tab').forEach(b=>b.classList.toggle('active',b.dataset.city===id));
  selDep = new Set(pair.dep.map(a=>a.c));
  selArr = new Set(pair.arr.map(a=>a.c));
  buildFilters();
  render();
}

function buildFilters() {
  document.getElementById('ops-filters').style.display = 'flex';
  document.getElementById('legend-box').style.display  = 'flex';

  function buildGroup(elId, sepId, airports, selSet, type) {
    const grp = document.getElementById(elId);
    const sep = document.getElementById(sepId);
    if (airports.length > 1) {
      grp.innerHTML = `<span class="filter-label">${type==='dep'?'出发：':'到达：'}</span>`;
      airports.forEach(a => {
        const b = document.createElement('button');
        b.className = 'apt-btn' + (selSet.has(a.c) ? ' active' : '');
        b.textContent = a.n + '(' + a.c + ')';
        b.dataset.code = a.c;
        b.onclick = () => toggleApt(type, a.c, b);
        grp.appendChild(b);
      });
      grp.style.display = 'flex';
      sep.style.display = 'block';
    } else {
      grp.style.display = 'none';
      sep.style.display = 'none';
    }
  }
  buildGroup('dep-grp','dep-sep', pair.dep, selDep, 'dep');
  buildGroup('arr-grp','arr-sep', pair.arr, selArr, 'arr');
}

function toggleApt(type, code, btn) {
  const s = type==='dep' ? selDep : selArr;
  if (s.has(code)) { if (s.size>1){ s.delete(code); btn.classList.remove('active'); } }
  else { s.add(code); btn.classList.add('active'); }
  render();
}

/* ── 主渲染 ── */
function render() {
  const days   = parseInt(document.getElementById('filter-days')?.value)||0;
  const cutoff = days>0 ? bjDate(days) : null;

  // 收集各route的记录
  const recAll = [], recFil = [];
  for (const route of pair.routes) {
    const [dep,arr] = route.split('-');
    if (!selDep.has(dep)||!selArr.has(arr)) continue;
    const data = opsData[route];
    if (!data) continue;
    for (const r of data.records) {
      const e = {...r, _dep:dep, _arr:arr};
      recAll.push(e);
      if (!cutoff || r.date >= cutoff) recFil.push(e);
    }
  }

  // 按航班号分组
  const fmap = new Map();
  for (const r of recAll) {
    if (!fmap.has(r.flight)) fmap.set(r.flight,{flight:r.flight,dep:r._dep,arr:r._arr,all:[],fil:[]});
    fmap.get(r.flight).all.push(r);
  }
  for (const r of recFil) {
    if (fmap.has(r.flight)) fmap.get(r.flight).fil.push(r);
  }

  // 计算每航班统计
  const rows = [];
  const chartDates = Array.from({length:60},(_,i)=>bjDate(60-i));

  for (const [,f] of fmap) {
    const valid = f.fil.filter(r=>r.status!=='Canceled'&&r.arr_delay!=null);
    const dep_sched = modeOf(f.all.map(r=>r.dep_sched));
    const arr_sched = modeOf(f.all.map(r=>r.arr_sched));
    const aircraft  = modeOf(f.all.map(r=>r.aircraft).filter(Boolean));
    const avg_dep_d = avgOf(valid.map(r=>r.dep_delay));
    const avg_arr_d = avgOf(valid.map(r=>r.arr_delay));
    const dmap = new Map();
    for (const r of f.all) {
      if (r.arr_delay!=null && r.status!=='Canceled') dmap.set(r.date, r.arr_delay);
    }
    rows.push({
      flight: f.flight, dep: f.dep, arr: f.arr,
      route: f.dep+'-'+f.arr,
      aircraft: aircraft||'—',
      dep_sched: dep_sched||'—', arr_sched: arr_sched||'—',
      dep_sched_min: t2m(dep_sched),
      avg_dep_actual: (t2m(dep_sched)!=null&&avg_dep_d!=null)?t2m(dep_sched)+avg_dep_d:null,
      avg_arr_actual: (t2m(arr_sched)!=null&&avg_arr_d!=null)?t2m(arr_sched)+avg_arr_d:null,
      avg_delay: avg_arr_d, sample: valid.length,
      dmap, valid,
    });
  }

  // 机身类型筛选
  const rowsShown = filterBody==='all' ? rows : rows.filter(f => {
    const wide = isWidebody(f.aircraft);
    return filterBody==='wide' ? wide : !wide;
  });

  // 全局最大延误
  let gmax = 0;
  for (const row of rowsShown) {
    for (const ds of chartDates) {
      const v = row.dmap.get(ds);
      if (v!=null && v>gmax) gmax = v;
    }
  }

  // 排序
  rowsShown.sort((a,b) => {
    let va, vb;
    if (sortCol==='dep_sched') { va=a.dep_sched_min??9999; vb=b.dep_sched_min??9999; }
    else if (sortCol==='avg_delay') { va=a.avg_delay??(sortAsc?Infinity:-Infinity); vb=b.avg_delay??(sortAsc?Infinity:-Infinity); }
    else { va=a[sortCol]??''; vb=b[sortCol]??''; }
    return va<vb?(sortAsc?-1:1):va>vb?(sortAsc?1:-1):0;
  });

  // 统计卡片（基于筛选后的航班）
  const validAll = rowsShown.flatMap(f => f.valid);
  const n = validAll.length;
  document.getElementById('stats-row').style.display = 'grid';
  document.getElementById('s-ontime').textContent = n ? Math.round(validAll.filter(r=>r.arr_delay<=15).length/n*100)+'%' : '—';
  const avgEl = document.getElementById('s-avg');
  const avgD  = avgOf(validAll.map(r=>r.arr_delay));
  avgEl.textContent = avgD!=null ? (avgD>=0?'+':'')+Math.round(avgD) : '—';
  avgEl.style.color = avgD>30?'#e74a3b':avgD>0?'#f6c23e':'#1cc88a';
  document.getElementById('s-heavy').textContent = n ? Math.round(validAll.filter(r=>r.arr_delay>60).length/n*100)+'%' : '—';
  document.getElementById('s-count').textContent = n||'—';
  document.getElementById('s-count-sub').textContent = n?'条有效记录':'';

  // 表格
  const wrap  = document.getElementById('tbl-wrap');
  const empty = document.getElementById('ops-empty');
  const tbody = document.getElementById('ops-tbody');

  if (!rowsShown.length) { wrap.style.display='none'; empty.style.display='block'; return; }
  wrap.style.display='block'; empty.style.display='none';
  document.getElementById('tbl-count').textContent = rowsShown.length+' 条航班';

  tbody.innerHTML = rowsShown.map(f => {
    const ds   = SHORT[f.dep]+'('+f.dep+') → '+SHORT[f.arr]+'('+f.arr+')';
    const info = lookupAircraft(f.aircraft);
    const wideClass = info?.wide ? ' class="wide-row"' : '';
    const badge = info
      ? `<span class="ac-badge">经济 ${info.eco_stars}★ | 商务 ${info.biz_stars}★</span>`
      : '';
    return `<tr${wideClass}>
      <td><strong>${f.flight}</strong></td>
      <td style="color:#6c757d;font-size:.8rem">${ds}</td>
      <td data-ac="${f.aircraft.replace(/"/g,'&quot;')}">${f.aircraft}${badge}</td>
      <td style="color:#495057;font-size:.8rem">${f.dep_sched} / ${f.arr_sched}</td>
      <td style="color:#495057;font-size:.8rem">${m2t(f.avg_dep_actual)} / ${m2t(f.avg_arr_actual)}</td>
      <td>${delayBadge(f.avg_delay)}<br><span style="font-size:.67rem;color:#c0c4cc">${f.sample}班</span></td>
      <td style="padding:6px 12px">${barChart(f.dmap, gmax)}</td>
    </tr>`;
  }).join('');
}

function doSort(col) {
  sortAsc = sortCol===col ? !sortAsc : (col==='dep_sched');
  sortCol = col;
  document.querySelectorAll('.ops-table th').forEach(th=>{
    th.classList.remove('sorted');
    const s=th.querySelector('.sa'); if(s) s.textContent='↕';
  });
  const th = document.querySelector(`[data-col="${col}"]`);
  if (th){ th.classList.add('sorted'); th.querySelector('.sa').textContent=sortAsc?'↑':'↓'; }
  render();
}

const FLIGHT_COLORS=['#4285f4','#ea4335','#34a853','#ff9800','#9c27b0','#00bcd4'];
const AIRPORT_NAME={
  PVG:'上海浦东 (PVG)',SHA:'上海虹桥 (SHA)',
  NRT:'东京成田 (NRT)',HND:'东京羽田 (HND)',
  ICN:'首尔仁川 (ICN)',GMP:'首尔金浦 (GMP)',
  PEK:'北京首都 (PEK)',PKX:'北京大兴 (PKX)',
};
const CABIN_NAME={y:'经济舱',s:'超级经济舱',c:'商务舱',f:'头等舱'};

async function fetchJSON(path){
  const r=await fetch(path+'?v='+Date.now());
  if(!r.ok) throw new Error(r.status);
  return r.json();
}
function tsToBeijing(utcStr){
  if(!utcStr) return '—';
  const d=new Date(utcStr+':00Z');
  const bj=new Date(d.getTime()+8*3600000);
  return `${String(bj.getUTCMonth()+1).padStart(2,'0')}/${String(bj.getUTCDate()).padStart(2,'0')} ${String(bj.getUTCHours()).padStart(2,'0')}:${String(bj.getUTCMinutes()).padStart(2,'0')}`;
}
function fmtDateP(s){
  if(!s) return '—';
  const[,m,d]=s.split('-');
  return `${parseInt(m)}月${parseInt(d)}日`;
}
function calcDuration(dep,arr){
  try{
    const[dh,dm]=dep.split(':').map(Number),[ah,am]=arr.split(':').map(Number);
    let mins=(ah*60+am)-(dh*60+dm); if(mins<0)mins+=1440;
    const h=Math.floor(mins/60),m=mins%60;
    return h>0?`${h}h${m>0?m+'m':''}`:m+'m';
  }catch{return '';}
}
function getLatest(arr,tss){
  for(let i=arr.length-1;i>=0;i--) if(arr[i]!=null) return{price:arr[i],ts:tss[i],idx:i};
  return{price:null,ts:null,idx:-1};
}
function getPrev(arr,bi){
  for(let i=bi-1;i>=0;i--) if(arr[i]!=null) return arr[i];
  return null;
}
function routeHeaderHTML(q){
  return `<div class="route-header">
    <span class="route-label">${AIRPORT_NAME[q.departure_id]||q.departure_id} → ${AIRPORT_NAME[q.arrival_id]||q.arrival_id}</span>
    <span class="route-tag">往返</span>
    <span class="route-tag">出发 ${fmtDateP(q.outbound_date)}</span>
    <span class="route-tag">返回 ${fmtDateP(q.return_date)}</span>
    <span class="route-tag-em">${CABIN_NAME[q.cabin]||'经济舱'}</span>
    <span class="route-tag">中国东方航空 (${q.airline_filter||'MU'})</span>
  </div>`;
}
function flightCardsHTML(h,cmap){
  const{flight_info:fi={},timestamps:ts=[],prices:p={},currency:cur='CNY'}=h;
  const sym=cur==='CNY'?'¥':cur+' ';
  const fns=Object.keys(fi).sort().filter(fn=>fi[fn]?.direct!==false);
  if(!fns.length) return '<div class="empty-msg">暂无航班数据，等待爬虫首次运行…</div>';
  return fns.map((fn,i)=>{
    const info=fi[fn]||{},arr=p[fn]||[],color=cmap[fn]||FLIGHT_COLORS[i%6];
    const latest=getLatest(arr,ts),prev=latest.idx>=0?getPrev(arr,latest.idx):null;
    const dur=info.depTime&&info.arrTime?calcDuration(info.depTime,info.arrTime):'';
    let ch='';
    if(latest.price!=null&&prev!=null){const d=latest.price-prev;ch=d>0?`<div class="price-change up">▲ ${d.toLocaleString('zh-CN')} 较上次</div>`:d<0?`<div class="price-change down">▼ ${Math.abs(d).toLocaleString('zh-CN')} 较上次</div>`:`<div class="price-change flat">— 与上次持平</div>`;}
    else if(latest.price!=null)ch=`<div class="price-change flat">首次记录</div>`;
    return `<div class="flight-card" style="border-top-color:${color}">
      <div class="flight-card-top"><div class="flight-no" style="color:${color}">${fn}</div>${info.direct!==false?'<div class="flight-badge">直达</div>':''}</div>
      <div class="flight-time">${info.depTime||'?'} → ${info.arrTime||'?'}${dur?' · '+dur:''}</div>
      <div class="flight-meta">${info.aircraft||'机型待更新'}</div>
      ${latest.price!=null?`<div class="flight-price"><span class="sym">${sym}</span>${latest.price.toLocaleString('zh-CN')}</div>`:`<div class="flight-price" style="font-size:1.1rem;color:#adb5bd">暂无数据</div>`}
      ${ch}<div class="flight-ts">${latest.ts?'更新于 '+tsToBeijing(latest.ts)+'（北京）':''}</div>
    </div>`;
  }).join('');
}
function renderPriceChart(h,cmap,id){
  const{flight_info:fi={},timestamps:ts=[],prices:p={},currency:cur='CNY'}=h;
  const sym=cur==='CNY'?'¥':cur+' ';
  const fns=Object.keys(fi).sort().filter(fn=>(fi[fn]||{}).direct!==false);
  if(!fns.length||!ts.length) return;
  new Chart(document.getElementById(id),{
    type:'line',
    data:{labels:ts.map(tsToBeijing),datasets:fns.map((fn,i)=>({
      label:`${fn}  ${(fi[fn]||{}).depTime||''}→${(fi[fn]||{}).arrTime||''}`,
      data:(p[fn]||[]).map(v=>v??null),
      borderColor:cmap[fn]||FLIGHT_COLORS[i%6],
      backgroundColor:(cmap[fn]||FLIGHT_COLORS[i%6])+'18',
      borderWidth:2.5,pointRadius:5,pointHoverRadius:7,
      fill:false,spanGaps:false,tension:0.25,
    }))},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{position:'top',labels:{usePointStyle:true,padding:16,font:{size:12}}},
        tooltip:{callbacks:{
          title:it=>'北京时间 '+it[0].label,
          label:ctx=>ctx.parsed.y!=null
            ?`  ${ctx.dataset.label.split('  ')[0]}: ${sym}${ctx.parsed.y.toLocaleString('zh-CN')}`
            :`  ${ctx.dataset.label.split('  ')[0]}: 无数据`,
        }},
      },
      scales:{
        x:{grid:{color:'#f0f0f0'},ticks:{maxRotation:45,font:{size:11},maxTicksLimit:20}},
        y:{grid:{color:'#f0f0f0'},ticks:{font:{size:11},callback:v=>sym+v.toLocaleString('zh-CN')}},
      },
    },
  });
}
function renderRouteSection(q,h,idx){
  const fns=Object.keys(h.flight_info||{}).sort().filter(fn=>(h.flight_info[fn]||{}).direct!==false);
  const cmap={}; fns.forEach((fn,i)=>{cmap[fn]=FLIGHT_COLORS[i%6];});
  const hasH=(h.timestamps||[]).length>0,cid=`chart_${idx}`;
  const sec=document.createElement('div');
  sec.className='route-section';
  sec.innerHTML=`${routeHeaderHTML(q)}
    <div class="flights-wrap"><div class="flights-grid">${fns.length?flightCardsHTML(h,cmap):'<div class="empty-msg">暂无航班数据</div>'}</div></div>
    <div class="chart-wrap-outer">
      <div class="chart-title-row"><div class="chart-title">历史价格走势</div><div class="chart-subtitle">经济舱往返含税（人民币）· 北京时间 · 点击图例可显示/隐藏</div></div>
      ${hasH?`<div class="chart-inner"><canvas id="${cid}"></canvas></div>`:'<div class="empty-msg">暂无历史记录</div>'}
    </div>`;
  document.getElementById('app').appendChild(sec);
  if(hasH) requestAnimationFrame(()=>renderPriceChart(h,cmap,cid));
}
async function loadPriceTab(){
  const app=document.getElementById('app');
  let cfg;
  try{cfg=await fetchJSON('config.json');}
  catch(e){app.innerHTML=`<div class="empty-msg">无法加载 config.json: ${e.message}</div>`;return;}
  const qs=cfg.queries||[];
  if(!qs.length){app.innerHTML='<div class="empty-msg">config.json 中尚未配置任何航线</div>';return;}
  app.innerHTML='';
  const hs=await Promise.all(qs.map(async q=>{
    try{return await fetchJSON(`data/history/${q.id}.json`);}
    catch{return{id:q.id,flight_info:{},timestamps:[],prices:{},currency:q.currency||'CNY'};}
  }));
  qs.forEach((q,i)=>renderRouteSection(q,hs[i],i));
  const allTs=hs.flatMap(h=>h.timestamps||[]);
  const lt=allTs.sort().slice(-1)[0];
  document.getElementById('footer').textContent=lt
    ?`数据最后更新：${tsToBeijing(lt)}（北京时间）`
    :`页面加载时间：${new Date().toLocaleString('zh-CN')}`;
}

/* ── 柱状图 Tooltip ── */
(function () {
  const tip = document.getElementById('bar-tip');

  function moveTip(e) {
    const pad = 14, w = 150, h = 52;
    let x = e.clientX + pad, y = e.clientY + pad;
    if (x + w > window.innerWidth)  x = e.clientX - w - pad;
    if (y + h > window.innerHeight) y = e.clientY - h - pad;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  }

  document.getElementById('ops-tbody').addEventListener('mouseover', e => {
    const rect = e.target;
    if (rect.tagName !== 'rect' || !rect.dataset.d) return;
    const ds  = rect.dataset.d;
    const val = parseFloat(rect.dataset.v);
    const mo  = parseInt(ds.slice(4, 6));
    const da  = parseInt(ds.slice(6, 8));
    const valLabel = val <= 0
      ? `<span style="color:#1cc88a">提前 ${Math.abs(Math.round(val))} 分钟</span>`
      : `<span style="color:${delayColor(val)}">${val > 0 ? '+' : ''}${Math.round(val)} 分钟</span>`;
    tip.innerHTML = `<div class="tip-date">${mo}月${da}日</div><div>落地延误：${valLabel}</div>`;
    tip.style.display = 'block';
    moveTip(e);
  });

  document.getElementById('ops-tbody').addEventListener('mousemove', e => {
    if (e.target.tagName === 'rect' && e.target.dataset.d) moveTip(e);
  });

  document.getElementById('ops-tbody').addEventListener('mouseout', e => {
    if (e.target.tagName === 'rect') tip.style.display = 'none';
  });
})();

/* ── Aircraft info tooltip ── */
(function () {
  const tip = document.getElementById('ac-tip');

  function moveTip(e) {
    const pad = 14, w = 290, h = 220;
    let x = e.clientX + pad, y = e.clientY + pad;
    if (x + w > window.innerWidth)  x = e.clientX - w - pad;
    if (y + h > window.innerHeight) y = e.clientY - h - pad;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  }

  document.getElementById('ops-tbody').addEventListener('mouseover', e => {
    const td = e.target.closest('td[data-ac]');
    if (!td) { tip.style.display = 'none'; return; }
    const info = lookupAircraft(td.dataset.ac);
    if (!info) { tip.style.display = 'none'; return; }
    const bodyLabel = info.wide ? '宽体机' : '窄体机';
    tip.innerHTML = `
      <div class="tip-title">${td.dataset.ac} · ${bodyLabel}</div>
      <div class="tip-section">经济舱</div>
      <div class="tip-row"><span class="tip-label">座位排布</span><span class="tip-val">${info.eco_layout}</span></div>
      <div class="tip-row"><span class="tip-label">座椅间距</span><span class="tip-val">${info.eco_pitch}</span></div>
      <div class="tip-row"><span class="tip-label">座椅宽度</span><span class="tip-val">${info.eco_width}</span></div>
      <div class="tip-row"><span class="tip-label">舒适度</span><span class="tip-val"><span class="tip-stars">${info.eco_stars}★</span> <span class="tip-note">${info.eco_note}</span></span></div>
      <div class="tip-section">商务舱</div>
      <div class="tip-row"><span class="tip-label">座位排布</span><span class="tip-val">${info.biz_layout}</span></div>
      <div class="tip-row"><span class="tip-label">座椅类型</span><span class="tip-val">${info.biz_type}</span></div>
      <div class="tip-row"><span class="tip-label">舒适度</span><span class="tip-val"><span class="tip-stars">${info.biz_stars}★</span> <span class="tip-note">${info.biz_note}</span></span></div>
      <div class="tip-seats">典型总座位数：${info.seats} 席</div>`;
    tip.style.display = 'block';
    moveTip(e);
  });

  document.getElementById('ops-tbody').addEventListener('mousemove', e => {
    if (e.target.closest('td[data-ac]')) moveTip(e);
    else tip.style.display = 'none';
  });

  document.getElementById('ops-tbody').addEventListener('mouseleave', () => {
    tip.style.display = 'none';
  });
})();

/* ── 启动 ── */
loadOpsData();
loadPriceTab();
</script>
