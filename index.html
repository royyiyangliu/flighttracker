<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>东航机票价格追踪</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 22px 32px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .header-title { font-size: 1.3rem; font-weight: 700; letter-spacing: .02em; }
    .header-sub   { font-size: 0.78rem; color: #8898aa; margin-top: 4px; }

    /* ── 主内容 ── */
    main { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

    /* ── 路线区块 ── */
    .route-section { margin-bottom: 40px; }

    .route-header {
      background: #fff;
      border-radius: 12px 12px 0 0;
      padding: 16px 22px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px 20px;
    }
    .route-label {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-right: 8px;
    }
    .route-tag {
      font-size: 0.75rem;
      color: #6c757d;
      background: #f0f2f5;
      border-radius: 5px;
      padding: 3px 9px;
      white-space: nowrap;
    }
    .route-tag-em {
      font-size: 0.75rem;
      color: #4e73df;
      background: #eef2ff;
      border-radius: 5px;
      padding: 3px 9px;
      font-weight: 500;
      white-space: nowrap;
    }

    /* ── 航班价格卡片 ── */
    .flights-wrap {
      background: #fff;
      padding: 16px 22px 20px;
    }
    .flights-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }
    .flight-card {
      background: #fafbff;
      border-radius: 10px;
      padding: 14px 16px;
      border: 1px solid #e8eaf0;
      border-top: 3px solid #4e73df;
    }
    .flight-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .flight-no     { font-size: 1rem; font-weight: 700; }
    .flight-badge  { font-size: 0.65rem; background: #eef2ff; color: #4e73df; border-radius: 4px; padding: 2px 6px; }
    .flight-time   { font-size: 0.85rem; color: #495057; margin-bottom: 2px; }
    .flight-meta   { font-size: 0.72rem; color: #adb5bd; margin-bottom: 12px; }
    .flight-price  { font-size: 1.7rem; font-weight: 700; line-height: 1; }
    .flight-price .sym { font-size: 1rem; font-weight: 400; color: #6c757d; margin-right: 1px; }
    .price-change  { font-size: 0.75rem; margin-top: 4px; font-weight: 500; }
    .price-change.up   { color: #e74a3b; }
    .price-change.down { color: #1cc88a; }
    .price-change.flat { color: #adb5bd; }
    .flight-ts { font-size: 0.68rem; color: #ced4da; margin-top: 3px; }

    /* ── 图表区域 ── */
    .chart-wrap-outer {
      background: #fff;
      border-radius: 0 0 12px 12px;
      padding: 16px 22px 22px;
      border-top: 1px solid #f0f0f0;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    .chart-title-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 16px;
    }
    .chart-title    { font-size: 0.9rem; font-weight: 600; }
    .chart-subtitle { font-size: 0.75rem; color: #adb5bd; }
    .chart-inner { position: relative; height: 300px; }

    /* ── 无数据提示 ── */
    .empty-msg {
      text-align: center;
      padding: 40px 20px;
      color: #adb5bd;
      font-size: 0.88rem;
    }

    footer {
      text-align: center;
      font-size: 0.72rem;
      color: #adb5bd;
      padding: 8px 0 28px;
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="header-title">东方航空 机票价格追踪</div>
    <div class="header-sub">数据来源：ceair.com 东航官网 · 每日北京时间 10:00 / 22:00 自动更新</div>
  </div>
</header>

<main id="app">
  <div class="empty-msg">加载中…</div>
</main>
<footer id="footer"></footer>

<script>
// ── 常量 ─────────────────────────────────────────────────────────
const FLIGHT_COLORS = ['#4285f4','#ea4335','#34a853','#ff9800','#9c27b0','#00bcd4'];
const AIRPORT_NAME  = {
  PVG: '上海浦东 (PVG)', SHA: '上海虹桥 (SHA)',
  NRT: '东京成田 (NRT)', HND: '东京羽田 (HND)',
  ICN: '首尔仁川 (ICN)', GMP: '首尔金浦 (GMP)',
  PEK: '北京首都 (PEK)', PKX: '北京大兴 (PKX)',
};
const CABIN_NAME = { y: '经济舱', s: '超级经济舱', c: '商务舱', f: '头等舱' };

// ── 工具函数 ──────────────────────────────────────────────────────
async function fetchJSON(path) {
  const r = await fetch(path + '?v=' + Date.now());
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

function tsToBeijing(utcStr) {
  if (!utcStr) return '—';
  const d  = new Date(utcStr + ':00Z');
  const bj = new Date(d.getTime() + 8 * 3600000);
  const mm  = String(bj.getUTCMonth() + 1).padStart(2, '0');
  const dd  = String(bj.getUTCDate()).padStart(2, '0');
  const hh  = String(bj.getUTCHours()).padStart(2, '0');
  const min = String(bj.getUTCMinutes()).padStart(2, '0');
  return `${mm}/${dd} ${hh}:${min}`;
}

function fmtDate(s) {
  if (!s) return '—';
  const [, m, d] = s.split('-');
  return `${parseInt(m)}月${parseInt(d)}日`;
}

function calcDuration(dep, arr) {
  try {
    const [dh, dm] = dep.split(':').map(Number);
    const [ah, am] = arr.split(':').map(Number);
    let mins = (ah * 60 + am) - (dh * 60 + dm);
    if (mins < 0) mins += 1440;
    const h = Math.floor(mins / 60), m = mins % 60;
    return h > 0 ? `${h}h${m > 0 ? m + 'm' : ''}` : `${m}m`;
  } catch { return ''; }
}

function getLatest(arr, tss) {
  for (let i = arr.length - 1; i >= 0; i--)
    if (arr[i] != null) return { price: arr[i], ts: tss[i], idx: i };
  return { price: null, ts: null, idx: -1 };
}

function getPrev(arr, beforeIdx) {
  for (let i = beforeIdx - 1; i >= 0; i--)
    if (arr[i] != null) return arr[i];
  return null;
}

// ── 渲染路线标头 ─────────────────────────────────────────────────
function routeHeaderHTML(query) {
  const dep   = AIRPORT_NAME[query.departure_id] || query.departure_id;
  const arr   = AIRPORT_NAME[query.arrival_id]   || query.arrival_id;
  const cabin = CABIN_NAME[query.cabin] || '经济舱';
  return `
    <div class="route-header">
      <span class="route-label">${dep} → ${arr}</span>
      <span class="route-tag">往返</span>
      <span class="route-tag">出发 ${fmtDate(query.outbound_date)}</span>
      <span class="route-tag">返回 ${fmtDate(query.return_date)}</span>
      <span class="route-tag-em">${cabin}</span>
      <span class="route-tag">中国东方航空 (${query.airline_filter || 'MU'})</span>
    </div>`;
}

// ── 渲染航班价格卡片 ─────────────────────────────────────────────
function flightCardsHTML(history, colorMap) {
  const { flight_info = {}, timestamps = [], prices = {}, currency = 'CNY' } = history;
  const sym = currency === 'CNY' ? '¥' : currency + ' ';
  const fns = Object.keys(flight_info).sort().filter(fn => flight_info[fn]?.direct !== false);
  if (!fns.length) return '<div class="empty-msg">暂无航班数据，等待爬虫首次运行…</div>';

  return fns.map((fn, i) => {
    const info   = flight_info[fn] || {};
    const arr    = prices[fn] || [];
    const latest = getLatest(arr, timestamps);
    const prev   = latest.idx >= 0 ? getPrev(arr, latest.idx) : null;
    const color  = colorMap[fn] || FLIGHT_COLORS[i % FLIGHT_COLORS.length];
    const dur    = info.depTime && info.arrTime ? calcDuration(info.depTime, info.arrTime) : '';

    let changeHTML = '';
    if (latest.price != null && prev != null) {
      const diff = latest.price - prev;
      if (diff > 0)      changeHTML = `<div class="price-change up">▲ ${diff.toLocaleString('zh-CN')} 较上次</div>`;
      else if (diff < 0) changeHTML = `<div class="price-change down">▼ ${Math.abs(diff).toLocaleString('zh-CN')} 较上次</div>`;
      else               changeHTML = `<div class="price-change flat">— 与上次持平</div>`;
    } else if (latest.price != null) {
      changeHTML = `<div class="price-change flat">首次记录</div>`;
    }

    const priceHTML = latest.price != null
      ? `<div class="flight-price"><span class="sym">${sym}</span>${latest.price.toLocaleString('zh-CN')}</div>`
      : `<div class="flight-price" style="font-size:1.1rem;color:#adb5bd">暂无数据</div>`;

    return `
      <div class="flight-card" style="border-top-color:${color}">
        <div class="flight-card-top">
          <div class="flight-no" style="color:${color}">${fn}</div>
          ${info.direct !== false ? '<div class="flight-badge">直达</div>' : ''}
        </div>
        <div class="flight-time">${info.depTime || '?'} → ${info.arrTime || '?'}${dur ? ' · ' + dur : ''}</div>
        <div class="flight-meta">${info.aircraft || '机型待更新'}</div>
        ${priceHTML}
        ${changeHTML}
        <div class="flight-ts">${latest.ts ? '更新于 ' + tsToBeijing(latest.ts) + '（北京）' : ''}</div>
      </div>`;
  }).join('');
}

// ── 渲染折线图 ───────────────────────────────────────────────────
function renderChart(history, colorMap, canvasId) {
  const { flight_info = {}, timestamps = [], prices = {}, currency = 'CNY' } = history;
  const sym = currency === 'CNY' ? '¥' : currency + ' ';
  const fns = Object.keys(flight_info).sort().filter(fn => flight_info[fn]?.direct !== false);
  if (!fns.length || !timestamps.length) return;

  const labels   = timestamps.map(tsToBeijing);
  const datasets = fns.map((fn, i) => {
    const info  = flight_info[fn] || {};
    const color = colorMap[fn] || FLIGHT_COLORS[i % FLIGHT_COLORS.length];
    const label = `${fn}  ${info.depTime || ''}→${info.arrTime || ''}`;
    return {
      label,
      data: (prices[fn] || []).map(v => v ?? null),
      borderColor: color,
      backgroundColor: color + '18',
      borderWidth: 2.5,
      pointRadius: 5,
      pointHoverRadius: 7,
      fill: false,
      spanGaps: false,
      tension: 0.25,
    };
  });

  const symRef = sym;
  new Chart(document.getElementById(canvasId), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'top', labels: { usePointStyle: true, padding: 16, font: { size: 12 } } },
        tooltip: {
          callbacks: {
            title: items => '北京时间 ' + items[0].label,
            label: ctx => {
              const v   = ctx.parsed.y;
              const fn2 = ctx.dataset.label.split('  ')[0];
              return v != null
                ? `  ${fn2}: ${symRef}${v.toLocaleString('zh-CN')}`
                : `  ${fn2}: 无数据`;
            },
          },
        },
      },
      scales: {
        x: { grid: { color: '#f0f0f0' }, ticks: { maxRotation: 45, font: { size: 11 }, maxTicksLimit: 20 } },
        y: {
          grid: { color: '#f0f0f0' },
          ticks: { font: { size: 11 }, callback: v => symRef + v.toLocaleString('zh-CN') },
        },
      },
    },
  });
}

// ── 渲染单条航线区块 ─────────────────────────────────────────────
function renderRouteSection(query, history, sectionIdx) {
  const fns = Object.keys(history.flight_info || {}).sort()
    .filter(fn => (history.flight_info[fn] || {}).direct !== false);
  const colorMap = {};
  fns.forEach((fn, i) => { colorMap[fn] = FLIGHT_COLORS[i % FLIGHT_COLORS.length]; });

  const hasFlights = fns.length > 0;
  const hasHistory = (history.timestamps || []).length > 0;
  const canvasId   = `chart_${sectionIdx}`;

  const chartInner = hasHistory
    ? `<div class="chart-inner"><canvas id="${canvasId}"></canvas></div>`
    : `<div class="empty-msg">暂无历史记录，等待爬虫首次运行…</div>`;

  const section = document.createElement('div');
  section.className = 'route-section';
  section.innerHTML = `
    ${routeHeaderHTML(query)}
    <div class="flights-wrap">
      <div class="flights-grid">${hasFlights ? flightCardsHTML(history, colorMap) : '<div class="empty-msg">暂无航班数据</div>'}</div>
    </div>
    <div class="chart-wrap-outer">
      <div class="chart-title-row">
        <div class="chart-title">历史价格走势</div>
        <div class="chart-subtitle">经济舱往返含税（人民币）· 北京时间 · 点击图例可显示/隐藏</div>
      </div>
      ${chartInner}
    </div>`;

  document.getElementById('app').appendChild(section);

  if (hasHistory) {
    // 等 DOM 插入完成再渲染图表
    requestAnimationFrame(() => renderChart(history, colorMap, canvasId));
  }
}

// ── 主流程 ───────────────────────────────────────────────────────
async function main() {
  const app = document.getElementById('app');

  let config;
  try {
    config = await fetchJSON('config.json');
  } catch (e) {
    app.innerHTML = `<div class="empty-msg">无法加载 config.json: ${e.message}</div>`;
    return;
  }

  const queries = config.queries || [];
  if (!queries.length) {
    app.innerHTML = `<div class="empty-msg">config.json 中尚未配置任何航线</div>`;
    return;
  }

  // 清空加载提示
  app.innerHTML = '';

  // 并行加载所有历史文件
  const histories = await Promise.all(queries.map(async (q) => {
    try {
      return await fetchJSON(`data/history/${q.id}.json`);
    } catch {
      return { id: q.id, flight_info: {}, timestamps: [], prices: {}, currency: q.currency || 'CNY' };
    }
  }));

  // 逐条渲染
  queries.forEach((q, i) => renderRouteSection(q, histories[i], i));

  // 页脚：取所有航线里最新的时间戳
  const allTs   = histories.flatMap(h => h.timestamps || []);
  const latestTs = allTs.sort().slice(-1)[0];
  document.getElementById('footer').textContent = latestTs
    ? `数据最后更新：${tsToBeijing(latestTs)}（北京时间）`
    : `页面加载时间：${new Date().toLocaleString('zh-CN')}`;
}

main();
</script>
</body>
</html>
