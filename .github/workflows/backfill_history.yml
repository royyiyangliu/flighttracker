name: Backfill History (one-time, generic)

on:
  workflow_dispatch:
    inputs:
      flights:
        description: '指定航班号，逗号分隔（如 MU5100,MU5232,MU5361）'
        required: false
        default: ''
      routes:
        description: '指定航线，逗号分隔（如 SHA-HKG,PVG-HKG）'
        required: false
        default: ''
      days:
        description: '回溯天数（默认 100）'
        required: false
        default: '100'

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Run history backfill
        run: |
          ARGS="--apply --days ${{ github.event.inputs.days || '100' }}"
          if [ -n "${{ github.event.inputs.flights }}" ]; then ARGS="$ARGS --flights ${{ github.event.inputs.flights }}"; fi
          if [ -n "${{ github.event.inputs.routes }}" ]; then ARGS="$ARGS --routes ${{ github.event.inputs.routes }}"; fi
          echo "Running: python scripts/backfill_history.py $ARGS"
          python scripts/backfill_history.py $ARGS

      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain data/ops/)" ]; then
            echo "无数据变更，跳过提交"; exit 0
          fi
          git stash --include-untracked
          git pull --rebase
          git stash pop
          git add data/ops/
          git commit -m "ops: backfill history $(date -u +'%Y-%m-%d')"
          git push
