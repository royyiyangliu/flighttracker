name: Backfill Hong Kong Routes (one-time)

on:
  workflow_dispatch:
    inputs:
      days:
        description: '回溯天数（默认 100）'
        required: false
        default: '100'

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Run Hong Kong backfill
        run: |
          DAYS=${{ github.event.inputs.days || '100' }}
          echo "Running: python scripts/backfill_hkg.py --apply --days $DAYS"
          python scripts/backfill_hkg.py --apply --days $DAYS

      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain data/ops/)" ]; then
            echo "无数据变更，跳过提交"; exit 0
          fi
          git stash --include-untracked
          git pull --rebase
          git stash pop
          git add data/ops/
          git commit -m "ops: backfill Hong Kong routes history $(date -u +'%Y-%m-%d')"
          git push
