name: Flight Ops Daily Update

on:
  schedule:
    - cron: '0 20 * * *'  # 北京时间 04:00（确保昨日所有航班已落地）
  workflow_dispatch:
    inputs:
      days:
        description: '回溯天数（默认1=只抓昨天，首次运行填60）'
        required: false
        default: '1'
      skip_discover:
        description: '跳过航班发现步骤 (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Run ops scraper
        run: |
          DAYS=${{ github.event.inputs.days || '1' }}
          SKIP=${{ github.event.inputs.skip_discover || 'false' }}
          if [ "$SKIP" = "true" ]; then
            python scripts/ops_daily.py --days $DAYS --skip-discover
          else
            python scripts/ops_daily.py --days $DAYS
          fi

      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ops/
          git diff --cached --quiet && echo "无变更，跳过提交" || \
            git commit -m "ops: update flight data $(date -u +'%Y-%m-%d')" && git push
