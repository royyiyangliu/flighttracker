name: Daily Flight Price Update

on:
  schedule:
    - cron: '0 2 * * *'    # 北京时间 10:00
    - cron: '0 14 * * *'   # 北京时间 22:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright playwright-stealth
          playwright install chromium --with-deps

      - name: Run scraper
        run: python scripts/daily_update.py

      - name: Upload debug screenshot (if exists)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: data/debug_screenshot.png
          if-no-files-found: ignore

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Price update $(date -u +%Y-%m-%d\ %H:%M) UTC"
          git push
