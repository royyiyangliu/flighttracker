name: Daily Flight Price Update

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 02:00 UTC = 北京时间 10:00
  workflow_dispatch:        # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Write cookies file
        env:
          TRIP_COM_COOKIES: ${{ secrets.TRIP_COM_COOKIES }}
        run: |
          if [ -n "$TRIP_COM_COOKIES" ]; then
            echo "$TRIP_COM_COOKIES" > cookies.json
            echo "cookies.json 已写入"
          else
            echo "未配置 TRIP_COM_COOKIES secret，跳过"
          fi

      - name: Run scraper
        run: python scripts/daily_update.py

      - name: Upload debug screenshot (if exists)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: data/debug_screenshot.png
          if-no-files-found: ignore

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Daily update $(date -u +%Y-%m-%d)"
          git push
